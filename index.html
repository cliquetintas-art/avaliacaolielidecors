align-items:center;

@keyframes gradientBG{

box-shadow:0 20px 50px rgba(0,0,0,0.6);

}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

width:70%;

text-decoration:none;
border-radius:30px;
font-size:14px;
transition:0.3s;
}

color:#000;
box-shadow:0 0 10px rgba(255,215,0,0.6);
}
